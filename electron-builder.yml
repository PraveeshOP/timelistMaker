appId: com.timelistmaker.app
productName: Timelist Maker
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json

# Lets `electron-builder --publish always` (used by .github/workflows/release.yml)
# upload installers straight to a GitHub Release matching the pushed git tag. Relies
# on electron-builder auto-detecting owner/repo from the checked-out git remote.
#
# releaseType: release — required for a multi-job release (macOS + Windows publishing
# to the same tag): electron-builder can't reliably find a *draft* release created by
# a separate prior invocation, so each job ends up creating its own duplicate draft
# instead of adding to one. A published release doesn't have that ambiguity — the
# second job's publish call finds it by tag and adds its assets to it correctly.
publish:
  provider: github
  releaseType: release

# Drop custom icons in build/icon.ico (Windows) and build/icon.icns (macOS) and uncomment
# the lines below to brand the installers. Without them, electron-builder falls back to
# its default Electron icon.
win:
  target:
    - target: nsis
      arch: [x64]
  # MSI is disabled: electron-builder/WiX4's MSI template references an icon resource
  # that's only generated when a real custom icon (win.icon, above) is configured — with
  # none set, the WiX linker fails with "identifier 'Icon:...' could not be found". Add
  # build/icon.ico and re-enable `- target: msi` (and uncomment win.icon) if MSI is wanted.
  # icon: build/icon.ico
  # Placeholder for real code signing — leave unset for unsigned dev builds.
  # certificateFile: path/to/cert.pfx
  # certificatePassword: env:WIN_CSC_KEY_PASSWORD

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  # icon: build/icon.icns
  # Placeholder for real notarization/signing — leave unset for unsigned dev builds.
  # identity: null disables signing entirely so unsigned local builds work without a cert.
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
