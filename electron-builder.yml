appId: com.timelistmaker.app
productName: Timelist Maker
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json

# No `publish` config here on purpose: .github/workflows/release.yml builds each
# platform's installer as a plain (non-publishing) build, then a separate final job
# creates the GitHub Release and uploads both installers in one atomic step via the
# `gh` CLI. electron-builder's own GitHub publisher proved unreliable across two
# separate processes targeting the same release — see release.yml for the details.

# Drop custom icons in build/icon.ico (Windows) and build/icon.icns (macOS) and uncomment
# the lines below to brand the installers. Without them, electron-builder falls back to
# its default Electron icon.
win:
  target:
    - target: nsis
      arch: [x64]
  # MSI is disabled: electron-builder/WiX4's MSI template references an icon resource
  # that's only generated when a real custom icon (win.icon, above) is configured — with
  # none set, the WiX linker fails with "identifier 'Icon:...' could not be found". Add
  # build/icon.ico and re-enable `- target: msi` (and uncomment win.icon) if MSI is wanted.
  # icon: build/icon.ico
  # Placeholder for real code signing — leave unset for unsigned dev builds.
  # certificateFile: path/to/cert.pfx
  # certificatePassword: env:WIN_CSC_KEY_PASSWORD

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  # icon: build/icon.icns
  # Placeholder for real notarization/signing — leave unset for unsigned dev builds.
  # identity: null disables signing entirely so unsigned local builds work without a cert.
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
