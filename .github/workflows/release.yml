name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # Each platform job only builds — it does NOT publish. electron-builder's own GitHub
  # publisher proved unreliable for this exact setup (two separate processes publishing
  # to the same release): it logged successful uploads that never actually landed on the
  # release, across several different configurations. Building an installer per job and
  # handing the actual release creation to a single later job avoids that entirely.
  build-mac:
    runs-on: macos-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --mac dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --win nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # Excludes the NSIS uninstaller stub electron-builder also drops in release/ —
          # only the actual Setup.exe should ship as a release asset.
          path: |
            release/*.exe
            !release/*uninstaller*.exe
          if-no-files-found: error

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with both installers
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/mac-installer/*.dmg \
            artifacts/windows-installer/*.exe \
            --title "${{ github.ref_name }}" \
            --generate-notes
